name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run tests
        run: uv run python -m pytest tests -q

      - name: Compile Python files
        run: uv run python -m py_compile server.py dashboard_live.py

      - name: Validate JSON templates
        run: uv run python -m json.tool configs/uv-mcp.json > /dev/null

      - name: Validate shell scripts
        run: |
          bash -n setup-project.sh
          bash -n hooks/*.sh
